<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FísicaQuest — Cinemática</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#07071a;--s:rgba(255,255,255,0.04);--cyan:#00e5ff;--yellow:#ffd700;
  --pink:#ff0080;--green:#39ff14;--text:#e2e8f0;--dim:#64748b;
  --fh:'Orbitron',monospace;--fb:'Exo 2',sans-serif
}
html,body{width:100%;height:100%;background:var(--bg);color:var(--text);
  font-family:var(--fb);overflow:hidden;user-select:none}
#bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
#app{position:relative;z-index:1;width:100%;height:100%;display:flex;
  align-items:center;justify-content:center;overflow:hidden}

/* SCREENS */
.screen{width:100%;max-width:860px;height:100%;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:16px;overflow-y:auto;
  animation:fadeUp .45s cubic-bezier(.16,1,.3,1) both}
@keyframes fadeUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}

/* MENU */
.logo{font-family:var(--fh);font-size:clamp(38px,9vw,78px);font-weight:900;
  text-transform:uppercase;letter-spacing:6px;text-align:center;line-height:1;
  background:linear-gradient(135deg,var(--cyan) 0%,#a78bfa 50%,var(--yellow) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.logo-sub{font-family:var(--fb);font-size:13px;letter-spacing:8px;color:var(--dim);
  text-transform:uppercase;margin:10px 0 36px;text-align:center}
.logo-desc{color:var(--dim);font-size:14px;line-height:1.8;max-width:380px;
  text-align:center;margin-bottom:40px}
.orbit-ring{width:180px;height:180px;border:1px solid rgba(0,229,255,.2);border-radius:50%;
  margin:0 auto 32px;position:relative;animation:spin 20s linear infinite}
.orbit-ring::before{content:'🛸';position:absolute;top:-18px;left:50%;
  transform:translateX(-50%);font-size:32px;filter:drop-shadow(0 0 12px var(--cyan))}
.orbit-ring::after{content:'';position:absolute;inset:20px;border:1px dashed rgba(255,215,0,.15);
  border-radius:50%}
@keyframes spin{to{transform:rotate(360deg)}}

/* BUTTONS */
.btn{background:transparent;border:2px solid currentColor;font-family:var(--fh);
  font-size:14px;letter-spacing:3px;padding:14px 40px;cursor:pointer;
  text-transform:uppercase;transition:all .25s;clip-path:polygon(10px 0%,100% 0%,calc(100% - 10px) 100%,0% 100%);
  position:relative;overflow:hidden}
.btn::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.08),transparent);transition:left .4s}
.btn:hover::before{left:100%}
.btn.c{color:var(--cyan);border-color:var(--cyan)}
.btn.c:hover{background:rgba(0,229,255,.1);box-shadow:0 0 24px rgba(0,229,255,.4);transform:translateY(-2px)}
.btn.y{color:var(--yellow);border-color:var(--yellow)}
.btn.y:hover{background:rgba(255,215,0,.1);box-shadow:0 0 24px rgba(255,215,0,.4);transform:translateY(-2px)}
.btn.g{color:var(--green);border-color:var(--green)}
.btn.g:hover{background:rgba(57,255,20,.1);box-shadow:0 0 24px rgba(57,255,20,.4);transform:translateY(-2px)}
.btn.p{color:var(--pink);border-color:var(--pink)}
.btn.p:hover{background:rgba(255,0,128,.1);box-shadow:0 0 24px rgba(255,0,128,.4);transform:translateY(-2px)}
.btn:disabled{opacity:.35;cursor:default;transform:none!important;box-shadow:none!important}

/* MODULE MAP */
.map-title{font-family:var(--fh);font-size:20px;color:var(--cyan);
  letter-spacing:3px;text-transform:uppercase;margin-bottom:12px;text-align:center}
.map-sub{color:var(--dim);font-size:13px;margin-bottom:36px;text-align:center}
.modules-row{display:flex;gap:20px;flex-wrap:wrap;justify-content:center;width:100%}
.mod-card{background:var(--s);border:1px solid rgba(255,255,255,.08);border-radius:18px;
  padding:28px 22px;width:230px;cursor:pointer;transition:all .3s;position:relative;
  overflow:hidden;text-align:center;backdrop-filter:blur(12px)}
.mod-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:var(--mc,var(--cyan));box-shadow:0 0 12px var(--mc,var(--cyan))}
.mod-card:not(.locked):hover{transform:translateY(-10px) scale(1.02);
  border-color:var(--mc,var(--cyan));box-shadow:0 24px 48px rgba(0,0,0,.5),0 0 20px color-mix(in srgb,var(--mc,var(--cyan)) 30%,transparent)}
.mod-card.locked{opacity:.38;cursor:not-allowed;filter:grayscale(.7)}
.mod-icon{font-size:46px;display:block;margin-bottom:14px;
  filter:drop-shadow(0 0 10px var(--mc,var(--cyan)))}
.mod-name{font-family:var(--fh);font-size:13px;letter-spacing:2px;color:var(--mc,var(--cyan));
  margin-bottom:8px;text-transform:uppercase}
.mod-desc{font-size:12px;color:var(--dim);line-height:1.6}
.mod-stars{margin-top:14px;font-size:22px;letter-spacing:4px}
.lock-badge{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:36px}
.progress-bar-wrap{width:100%;max-width:600px;margin-top:36px;text-align:center}
.progress-bar-label{font-size:12px;color:var(--dim);letter-spacing:2px;margin-bottom:8px}
.progress-bar-track{height:4px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden}
.progress-bar-fill{height:100%;border-radius:2px;transition:width .6s ease;
  background:linear-gradient(90deg,var(--cyan),var(--yellow))}

/* THEORY */
.theory-hdr{display:flex;justify-content:space-between;align-items:center;
  width:100%;max-width:820px;margin-bottom:16px}
.theory-mod-name{font-family:var(--fh);font-size:12px;letter-spacing:3px;
  color:var(--mc,var(--cyan));text-transform:uppercase}
.slide-counter{font-size:12px;color:var(--dim);letter-spacing:2px}
.theory-card{background:var(--s);border:1px solid rgba(255,255,255,.09);border-radius:20px;
  padding:32px 36px;width:100%;max-width:820px;backdrop-filter:blur(14px);
  display:flex;flex-direction:column;align-items:center;gap:18px;
  animation:fadeUp .4s ease}
.theory-title{font-family:var(--fh);font-size:19px;color:var(--yellow);
  text-align:center;letter-spacing:2px}
.theory-text{color:var(--dim);font-size:14.5px;line-height:1.85;text-align:center;max-width:640px}
.theory-text strong{color:var(--text)}
.formulas-row{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;width:100%}
.formula-box{border-radius:12px;padding:14px 24px;text-align:center;border:1px solid}
.formula-box .flabel{font-size:11px;letter-spacing:2px;text-transform:uppercase;
  opacity:.7;margin-bottom:6px}
.formula-box .fexpr{font-family:var(--fh);font-size:16px;letter-spacing:1px}
.formula-box.fc{background:rgba(0,229,255,.06);border-color:rgba(0,229,255,.3);color:var(--cyan)}
.formula-box.fy{background:rgba(255,215,0,.06);border-color:rgba(255,215,0,.3);color:var(--yellow)}
.formula-box.fg{background:rgba(57,255,20,.06);border-color:rgba(57,255,20,.3);color:var(--green)}
.formula-box.fp{background:rgba(255,0,128,.06);border-color:rgba(255,0,128,.3);color:var(--pink)}
#sim-canvas{border-radius:12px;border:1px solid rgba(255,255,255,.08);display:block;
  background:rgba(0,0,0,.25)}
.theory-nav{display:flex;gap:14px;margin-top:8px;flex-wrap:wrap;justify-content:center}
.slide-dots{display:flex;gap:8px;margin-top:8px}
.dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.2);transition:all .3s}
.dot.active{background:var(--cyan);box-shadow:0 0 8px var(--cyan)}
.dot.done{background:var(--yellow);box-shadow:0 0 6px var(--yellow)}
.theory-table{border-collapse:collapse;width:100%;font-size:12.5px}
.theory-table th{background:rgba(0,229,255,.08);color:var(--cyan);padding:9px 14px;
  text-align:left;border:1px solid rgba(0,229,255,.2);font-family:var(--fh);
  font-size:11px;letter-spacing:1px;font-weight:400}
.theory-table td{padding:9px 14px;border:1px solid rgba(255,255,255,.07);color:var(--dim)}
.theory-table tr:nth-child(even) td{background:rgba(255,255,255,.02)}

/* QUIZ */
.quiz-hdr{display:flex;align-items:center;gap:14px;width:100%;max-width:820px;margin-bottom:18px}
.q-progress{flex:1;height:5px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden}
.q-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--cyan),var(--yellow));
  transition:width .5s ease}
.lives-hdr{font-size:20px;letter-spacing:3px}
.score-hdr{font-family:var(--fh);font-size:14px;color:var(--yellow);letter-spacing:2px;white-space:nowrap}
.question-card{background:var(--s);border:1px solid rgba(255,255,255,.09);border-radius:20px;
  padding:28px 34px;width:100%;max-width:820px;backdrop-filter:blur(14px);
  animation:fadeUp .4s ease}
.q-num{font-size:11px;color:var(--dim);letter-spacing:3px;text-transform:uppercase;margin-bottom:10px}
.q-text{font-size:17px;line-height:1.65;color:var(--text);margin-bottom:26px;font-weight:600}
.answers{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.ans-btn{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.12);
  border-radius:12px;padding:14px 18px;color:var(--text);font-family:var(--fb);
  font-size:14px;cursor:pointer;text-align:left;transition:all .2s;
  display:flex;align-items:flex-start;gap:11px;line-height:1.4}
.ans-btn:hover:not(:disabled){background:rgba(0,229,255,.07);
  border-color:rgba(0,229,255,.5);transform:translateX(3px)}
.ans-letter{width:26px;height:26px;border-radius:50%;background:rgba(255,255,255,.1);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--fh);font-size:11px;flex-shrink:0;margin-top:1px}
.ans-btn.correct{background:rgba(57,255,20,.12);border-color:var(--green);color:var(--green)}
.ans-btn.correct .ans-letter{background:rgba(57,255,20,.3);color:var(--green)}
.ans-btn.wrong{background:rgba(255,0,128,.12);border-color:var(--pink);color:var(--pink)}
.ans-btn.wrong .ans-letter{background:rgba(255,0,128,.3);color:var(--pink)}
.ans-btn.reveal{background:rgba(57,255,20,.06);border-color:rgba(57,255,20,.25);color:rgba(57,255,20,.7)}
.ans-btn:disabled{cursor:default}
.feedback{margin-top:14px;padding:11px 18px;border-radius:10px;font-size:14px;
  text-align:center;animation:fadeUp .3s ease;line-height:1.5}
.feedback.ok{background:rgba(57,255,20,.08);border:1px solid rgba(57,255,20,.25);color:var(--green)}
.feedback.no{background:rgba(255,0,128,.08);border:1px solid rgba(255,0,128,.25);color:var(--pink)}
.next-wrap{margin-top:16px;text-align:right}

/* RESULT */
.result-icon{font-size:72px;text-align:center;animation:popIn .6s cubic-bezier(.175,.885,.32,1.275)}
@keyframes popIn{from{transform:scale(0) rotate(-20deg);opacity:0}to{transform:scale(1) rotate(0);opacity:1}}
.result-title{font-family:var(--fh);font-size:clamp(24px,5vw,42px);font-weight:900;
  text-align:center;margin:10px 0}
.stars-big{font-size:52px;letter-spacing:10px;text-align:center;margin:16px 0;
  animation:popIn .5s .2s both}
.result-score{font-family:var(--fh);font-size:52px;color:var(--yellow);text-align:center}
.result-score-label{font-size:12px;color:var(--dim);letter-spacing:3px;margin-bottom:28px;text-align:center}
.result-btns{display:flex;gap:14px;flex-wrap:wrap;justify-content:center}
.result-stats{display:flex;gap:24px;margin:20px 0;flex-wrap:wrap;justify-content:center}
.stat-box{background:var(--s);border:1px solid rgba(255,255,255,.08);border-radius:14px;
  padding:16px 24px;text-align:center;min-width:110px}
.stat-val{font-family:var(--fh);font-size:24px;color:var(--cyan)}
.stat-label{font-size:11px;color:var(--dim);letter-spacing:2px;text-transform:uppercase;margin-top:4px}

/* PARTICLES */
.pfloat{position:fixed;pointer-events:none;font-family:var(--fh);font-size:16px;
  font-weight:700;opacity:0;z-index:200;animation:pfloat 1.4s ease forwards}
@keyframes pfloat{
  0%{opacity:1;transform:translateY(0) scale(1)}
  100%{opacity:0;transform:translateY(-90px) scale(1.6)}
}
.shake{animation:shake .35s ease}
@keyframes shake{
  0%,100%{transform:translateX(0)}
  20%{transform:translateX(-8px)}
  40%{transform:translateX(8px)}
  60%{transform:translateX(-5px)}
  80%{transform:translateX(5px)}
}

/* FINAL */
.final-wrap{text-align:center;max-width:600px}
.final-logo{font-family:var(--fh);font-size:clamp(28px,6vw,52px);font-weight:900;
  background:linear-gradient(135deg,var(--cyan),var(--yellow));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  letter-spacing:4px;margin-bottom:12px}
.final-stars{font-size:64px;letter-spacing:12px;display:block;margin:20px 0;
  animation:popIn .6s .1s both}
.modules-summary{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;margin:24px 0}
.summary-chip{background:var(--s);border:1px solid rgba(255,255,255,.1);
  border-radius:50px;padding:10px 20px;font-size:13px;display:flex;align-items:center;gap:8px}

@media(max-width:600px){
  .answers{grid-template-columns:1fr}
  .modules-row{flex-direction:column;align-items:center}
  .theory-card,.question-card{padding:20px 16px}
  .formulas-row{flex-direction:column}
}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div id="app"></div>
<script>
// ════════════════════════════════════════
//  STAR FIELD BACKGROUND
// ════════════════════════════════════════
const bgC = document.getElementById('bg');
const bgX = bgC.getContext('2d');
let stars=[], nebulas=[];

function initBg(){
  bgC.width=innerWidth; bgC.height=innerHeight;
  stars=Array.from({length:220},()=>({
    x:Math.random()*bgC.width, y:Math.random()*bgC.height,
    r:Math.random()*1.6+.3, spd:Math.random()*.25+.04,
    a:Math.random()*.8+.2, tw:Math.random()*Math.PI*2
  }));
  nebulas=[
    {x:bgC.width*.2,y:bgC.height*.3,r:280,c:'rgba(0,80,200,'},
    {x:bgC.width*.8,y:bgC.height*.6,r:220,c:'rgba(120,0,220,'},
    {x:bgC.width*.5,y:bgC.height*.8,r:200,c:'rgba(0,180,160,'}
  ];
}

function drawBg(t){
  bgX.clearRect(0,0,bgC.width,bgC.height);
  for(const n of nebulas){
    const g=bgX.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r);
    g.addColorStop(0,n.c+'.06)'); g.addColorStop(1,n.c+'0)');
    bgX.fillStyle=g; bgX.beginPath(); bgX.arc(n.x,n.y,n.r,0,Math.PI*2); bgX.fill();
  }
  for(const s of stars){
    s.tw+=.018; const a=s.a*(.65+.35*Math.sin(s.tw));
    bgX.beginPath(); bgX.arc(s.x,s.y,s.r,0,Math.PI*2);
    bgX.fillStyle=`rgba(255,255,255,${a})`; bgX.fill();
    s.x-=s.spd; if(s.x<0) s.x=bgC.width;
  }
  requestAnimationFrame(drawBg);
}

window.addEventListener('resize',initBg);
initBg(); requestAnimationFrame(drawBg);

// ════════════════════════════════════════
//  GAME DATA
// ════════════════════════════════════════
const MODS=[
{
  id:'mu', title:'Movimento Uniforme', short:'MU',
  color:'#00e5ff', emoji:'🛸',
  desc:'Velocidade constante\nEspaços iguais, tempos iguais',
  theory:[
    {
      title:'O que é o Movimento Uniforme?',
      text:'O Movimento Uniforme (MU) ocorre quando um corpo percorre <strong>espaços iguais em intervalos de tempo iguais</strong>. A velocidade permanece constante — nem aumenta, nem diminui. O movimento pode ser retilíneo ou curvilíneo.',
      formulas:[{l:'Condição fundamental',e:'v = constante ≠ 0',c:'fc'}],
      sim:'mu_motion'
    },
    {
      title:'Função Horária do Espaço',
      text:'Conhecendo a posição inicial s₀ e a velocidade constante v, podemos calcular a posição s em qualquer instante t. A equação do MU é de <strong>1º grau</strong> em t — o gráfico s×t é uma reta.',
      formulas:[
        {l:'Equação horária',e:'s = s₀ + v · t',c:'fc'},
        {l:'Variação de espaço',e:'Δs = v · t',c:'fy'}
      ],
      sim:null
    },
    {
      title:'Gráficos do Movimento Uniforme',
      text:'No gráfico <strong>v×t</strong>, velocidade constante = reta horizontal. No gráfico <strong>s×t</strong>, posição cresce linearmente = reta com inclinação v. A área sob o gráfico v×t representa o deslocamento.',
      formulas:[{l:'Propriedade',e:'"Área" do v×t = Δs',c:'fg'}],
      sim:'mu_graphs'
    }
  ],
  questions:[
    {
      q:'🚛 Um caminhão trafega a 144 km/h. O motorista cochila por 1,0 s. Qual distância é percorrida?',
      opts:['20 m','40 m','80 m','144 m'],
      ans:1,
      exp:'144 km/h ÷ 3,6 = 40 m/s. Usando Δs = v·t: Δs = 40 × 1 = <strong>40 m</strong>'
    },
    {
      q:'🐟 Um sonar emite sinal que retorna em 0,30 s. Velocidade do ultrassom: 1480 m/s. Profundidade do cardume?',
      opts:['111 m','222 m','444 m','740 m'],
      ans:1,
      exp:'O sinal vai e volta: Δs total = 1480 × 0,30 = 444 m. Profundidade = 444 ÷ 2 = <strong>222 m</strong>'
    },
    {
      q:'⚡ Funções horárias: sₐ = 4t e s_b = 120 − 2t. Em que instante as partículas se encontram?',
      opts:['t = 10 s','t = 15 s','t = 20 s','t = 30 s'],
      ans:2,
      exp:'4t = 120 − 2t → 6t = 120 → t = <strong>20 s</strong>. Posição: s = 4×20 = 80 m'
    },
    {
      q:'🦊 Raposa a 72 km/h persegue coelho a 54 km/h, com 100 m de vantagem. Quanto tempo dura a perseguição?',
      opts:['10 s','15 s','20 s','25 s'],
      ans:2,
      exp:'v_rel = 72 − 54 = 18 km/h = 5 m/s. t = 100 ÷ 5 = <strong>20 s</strong>'
    },
    {
      q:'📊 Como é o gráfico da velocidade v×t no Movimento Uniforme?',
      opts:['Uma parábola ascendente','Uma reta com inclinação constante','Uma semirreta paralela ao eixo do tempo','Uma curva senoidal'],
      ans:2,
      exp:'No MU, v é constante → o gráfico v×t é uma <strong>reta horizontal</strong> paralela ao eixo t.'
    }
  ]
},
{
  id:'mruv', title:'MRUV', short:'MRUV',
  color:'#ffd700', emoji:'🚀',
  desc:'Aceleração constante\nVelocidade varia uniformemente',
  theory:[
    {
      title:'O que é o MRUV?',
      text:'No MRUV, o corpo possui <strong>aceleração constante e diferente de zero</strong>. A velocidade varia uniformemente — cresce ou diminui na mesma quantidade a cada segundo. A trajetória é retilínea.',
      formulas:[{l:'Aceleração',e:'a = ΔV/Δt = constante',c:'fy'}],
      sim:'mruv_motion'
    },
    {
      title:'As 3 Equações Fundamentais',
      text:'Três equações descrevem completamente o MRUV. Use a <strong>Torricelli</strong> quando o tempo não é fornecido no problema — ela relaciona velocidade e deslocamento diretamente.',
      formulas:[
        {l:'Horária da velocidade',e:'V = V₀ + a·t',c:'fc'},
        {l:'Horária da posição',e:'S = S₀ + V₀t + at²/2',c:'fy'},
        {l:'Torricelli (sem t)',e:'V² = V₀² + 2a·ΔS',c:'fg'}
      ],
      sim:null
    },
    {
      title:'Acelerado vs Retardado',
      text:'Quando V e a têm o <strong>mesmo sinal</strong>, a velocidade <em>aumenta</em> (acelerado). Quando têm <strong>sinais opostos</strong>, a velocidade <em>diminui</em> (retardado/frenagem).',
      table:{
        h:['Velocidade (V)','Aceleração (a)','Classificação'],
        r:[
          ['Positiva (+)','Positiva (+)','Progressivo Acelerado'],
          ['Positiva (+)','Negativa (−)','Progressivo Retardado'],
          ['Negativa (−)','Positiva (+)','Retrógrado Retardado'],
          ['Negativa (−)','Negativa (−)','Retrógrado Acelerado']
        ]
      },
      sim:null
    }
  ],
  questions:[
    {
      q:'⚡ Um objeto vai de 3 m/s a 9 m/s em 2 segundos. Qual é a aceleração?',
      opts:['1,5 m/s²','2 m/s²','3 m/s²','6 m/s²'],
      ans:2,
      exp:'a = ΔV/Δt = (9 − 3)/2 = 6/2 = <strong>3 m/s²</strong>'
    },
    {
      q:'🏎️ Um carro parte do repouso com a = 3 m/s². Após 5 segundos, qual o deslocamento?',
      opts:['15 m','30 m','37,5 m','75 m'],
      ans:2,
      exp:'ΔS = V₀t + at²/2 = 0 + 3×25/2 = <strong>37,5 m</strong>. Velocidade final: V = 3×5 = 15 m/s'

let raf=null;
function stopSim(){if(raf){cancelAnimationFrame(raf);raf=null}}

function startSim(type){
  stopSim();
  const el=document.getElementById('sim-canvas');
  if(!el) return;
  const W=el.width, H=el.height;
  const cx=el.getContext('2d');

  if(type==='mu_motion'){
    // Spaceship moving at constant speed + live s×t plot
    let sx=60,t=0,pts=[];
    const v=60; // px/s
    const pw=W*.55, ph=H*.55; // play area
    function frame(){
      cx.clearRect(0,0,W,H);
      // Background strip
      cx.fillStyle='rgba(0,10,40,.8)';
      cx.fillRect(0,0,W,ph);
      // Track line
      cx.strokeStyle='rgba(255,255,255,.15)';cx.lineWidth=1;
      cx.setLineDash([12,8]);
      cx.beginPath();cx.moveTo(0,ph*.6);cx.lineTo(W,ph*.6);cx.stroke();
      cx.setLineDash([]);
      // Spaceship
      cx.save();cx.translate(sx,ph*.55);
      cx.fillStyle='#00e5ff';
      cx.beginPath();cx.moveTo(24,0);cx.lineTo(-12,10);cx.lineTo(-4,0);cx.lineTo(-12,-10);cx.closePath();cx.fill();
      cx.fillStyle='rgba(0,229,255,.3)';
      cx.beginPath();cx.moveTo(-4,0);cx.lineTo(-24,7);cx.lineTo(-16,0);cx.lineTo(-24,-7);cx.closePath();cx.fill();
      cx.restore();
      // Velocity label
      cx.fillStyle='rgba(0,229,255,.8)';cx.font='bold 11px Orbitron,monospace';
      cx.fillText('v = constante',10,16);
      // Graph
      const gx=0,gy=ph+6,gw=W,gh=H-ph-8;
      cx.fillStyle='rgba(0,0,0,.3)';cx.fillRect(gx,gy,gw,gh);
      cx.fillStyle='rgba(255,255,255,.06)';cx.fillRect(gx,gy,gw,gh);
      // Axes
      cx.strokeStyle='rgba(255,255,255,.3)';cx.lineWidth=1;
      cx.beginPath();cx.moveTo(gx+30,gy+4);cx.lineTo(gx+30,gy+gh-4);
      cx.moveTo(gx+28,gy+gh-4);cx.lineTo(gx+gw-4,gy+gh-4);cx.stroke();
      cx.fillStyle='rgba(255,255,255,.4)';cx.font='10px Exo 2,sans-serif';
      cx.fillText('s',gx+34,gy+10);cx.fillText('t',gx+gw-10,gy+gh-6);
      // Plot line
      if(pts.length>1){
        cx.strokeStyle='#00e5ff';cx.lineWidth=2;cx.shadowBlur=8;cx.shadowColor='#00e5ff';
        cx.beginPath();
        const maxT=8,maxS=W*.8;
        pts.forEach((p,i)=>{
          const px2=gx+32+(p.t/maxT)*(gw-40);
          const py2=gy+gh-6-(p.s/maxS)*(gh-14);
          i===0?cx.moveTo(px2,py2):cx.lineTo(px2,py2);
        });
        cx.stroke();cx.shadowBlur=0;
      }
      cx.fillStyle='rgba(0,229,255,.7)';cx.font='10px Orbitron,monospace';
      cx.fillText('s×t',gx+36,gy+22);
      // Update
      t+=1/60; sx+=(v/60);
      pts.push({t,s:sx-60});
      if(sx>W+40){sx=60;t=0;pts=[]}
      raf=requestAnimationFrame(frame);
    }
    frame();
  }

  else if(type==='mu_graphs'){
    let t=0;
    function frame(){
      cx.clearRect(0,0,W,H);
      const v=40; // pixels per time unit
      const half=W/2;
      // LEFT: v×t graph
      drawGraph(cx,10,10,half-20,H-20,'v×t','t','v',
        (x,w,y,h)=>{
          // horizontal line
          const vy=y+h*.4;
          cx.strokeStyle='#00e5ff';cx.lineWidth=2.5;cx.shadowBlur=8;cx.shadowColor='#00e5ff';
          cx.beginPath();cx.moveTo(x+30,vy);cx.lineTo(x+w-10,vy);cx.stroke();cx.shadowBlur=0;
          cx.fillStyle='rgba(0,229,255,.15)';
          const prog=Math.min(t/8,1);
          cx.fillRect(x+30,vy,prog*(w-40),y+h-vy-6);
          cx.fillStyle='rgba(0,229,255,.9)';cx.font='11px Orbitron,monospace';
          cx.fillText('v = cte',x+35,vy-8);
          cx.fillStyle='rgba(255,215,0,.8)';cx.font='10px Exo 2,sans-serif';
          cx.fillText('Área = Δs',x+35+prog*(w-40)*.35,vy+14);
        }
      );
      // RIGHT: s×t graph
      drawGraph(cx,half+10,10,half-20,H-20,'s×t','t','s',
        (x,w,y,h)=>{
          const prog=Math.min(t/8,1);
          cx.strokeStyle='#ffd700';cx.lineWidth=2.5;cx.shadowBlur=8;cx.shadowColor='#ffd700';
          cx.beginPath();
          const x0=x+30,y0=y+h-20;
          cx.moveTo(x0,y0);
          const x1=x0+prog*(w-40),y1=y0-prog*(h-30)*0.85;
          cx.lineTo(x1,y1);cx.stroke();cx.shadowBlur=0;
          cx.fillStyle='rgba(255,215,0,.9)';cx.font='11px Orbitron,monospace';
          cx.fillText('s = s₀+vt',x0+5,y0-15);
        }
      );
      t+=1/60; if(t>9) t=0;
      raf=requestAnimationFrame(frame);
    }
    frame();
  }

  else if(type==='mruv_motion'){
    let t=0,vx=10;
    const a=18;
    let rx=60;
    function frame(){
      cx.clearRect(0,0,W,H);
      const half=H*.6;
      // BG
      cx.fillStyle='rgba(0,5,30,.8)';cx.fillRect(0,0,W,half);
      // Track
      cx.strokeStyle='rgba(255,255,255,.1)';cx.lineWidth=1;cx.setLineDash([10,8]);
      cx.beginPath();cx.moveTo(0,half*.65);cx.lineTo(W,half*.65);cx.stroke();cx.setLineDash([]);
      // Exhaust particles
      const exhaust=Math.floor(vx/15);
      for(let i=0;i<exhaust+2;i++){
        const ex=rx-20-Math.random()*30,ey=half*.6+Math.random()*12-6;
        const a2=(1-i/exhaust)*0.8;
        cx.beginPath();cx.arc(ex,ey,Math.random()*3+1,0,Math.PI*2);
        cx.fillStyle=`rgba(255,${100+Math.floor(Math.random()*100)},0,${a2})`;cx.fill();
      }
      // Rocket
      cx.save();cx.translate(rx,half*.62);
      cx.fillStyle='#ffd700';
      cx.beginPath();cx.moveTo(28,0);cx.lineTo(-10,14);cx.lineTo(0,0);cx.lineTo(-10,-14);cx.closePath();cx.fill();
      cx.fillStyle='rgba(255,100,0,.6)';
      cx.beginPath();cx.moveTo(0,0);cx.lineTo(-28,10);cx.lineTo(-18,0);cx.lineTo(-28,-10);cx.closePath();cx.fill();
      cx.restore();
      // Velocity bar
      const barW=W-40,barH=14;
      const bx=20,by=half+12;
      cx.fillStyle='rgba(255,255,255,.08)';cx.fillRect(bx,by,barW,barH);
      cx.fillStyle='#ffd700';cx.fillRect(bx,by,Math.min(vx/180,1)*barW,barH);
      cx.fillStyle='rgba(255,255,255,.5)';cx.font='10px Orbitron,monospace';
      cx.fillText(`v = ${vx.toFixed(0)} u/s`,bx+4,by+10);
      // Graph area
      const gy2=half+barH+22,gh2=H-gy2-8;
      drawGraph(cx,10,gy2,W-20,gh2,'v×t','t','v',
        (x,w,y,h)=>{
          const prog=Math.min(t/5,1);
          cx.strokeStyle='#ffd700';cx.lineWidth=2;cx.shadowBlur=6;cx.shadowColor='#ffd700';
          cx.beginPath();
          cx.moveTo(x+28,y+h-8);
          cx.lineTo(x+28+prog*(w-36),y+h-8-(prog*(h-16))*.9);
          cx.stroke();cx.shadowBlur=0;
          cx.fillStyle='rgba(255,215,0,.9)';cx.font='10px Orbitron,monospace';
          cx.fillText('V = V₀+at',x+32,y+h-14);
        }
      );
      // Physics
      vx+=a/60; rx+=vx/60;
      t+=1/60;
      if(rx>W+60){rx=60;vx=10;t=0}
      raf=requestAnimationFrame(frame);
    }
    frame();
  }

  else if(type==='graph_area'){
    let t=0;
    function frame(){
      cx.clearRect(0,0,W,H);
      drawGraph(cx,10,10,W-20,H-20,'v×t — Área = Deslocamento','t','v',
        (x,w,y,h)=>{
          const v1=h*.35, v2=h*.72;
          const t1=x+28+.2*(w-36), t2=x+28+.7*(w-36);
          // Pulse alpha
          const pulse=.12+.08*Math.sin(t*3);
          // Shaded area (trapezoid)
          cx.fillStyle=`rgba(255,0,128,${pulse+.08})`;
          cx.beginPath();
          cx.moveTo(t1,y+h-8);cx.lineTo(t1,y+v2);
          cx.lineTo(t2,y+v2);cx.lineTo(t2,y+h-8);
          cx.closePath();cx.fill();
          // Border
          cx.strokeStyle=`rgba(255,0,128,.7)`;cx.lineWidth=1.5;
          cx.strokeRect(t1,y+v2,t2-t1,y+h-8-y-v2);
          // Horizontal line (constant v)
          cx.strokeStyle='#ff0080';cx.lineWidth=2.5;cx.shadowBlur=8;cx.shadowColor='#ff0080';
          cx.beginPath();cx.moveTo(x+28,y+v2);cx.lineTo(x+w-8,y+v2);cx.stroke();cx.shadowBlur=0;
          // Labels
          cx.fillStyle='rgba(255,0,128,.9)';cx.font='bold 12px Orbitron,monospace';
          cx.fillText('Δs',t1+(t2-t1)/2-8,y+v2+(y+h-8-y-v2)/2+5);
          cx.fillStyle='rgba(255,255,255,.5)';cx.font='10px Exo 2,sans-serif';
          cx.fillText('t₁',t1-6,y+h-2);cx.fillText('t₂',t2-6,y+h-2);
          cx.fillStyle='rgba(255,0,128,.7)';cx.font='10px Exo 2,sans-serif';
          cx.fillText('"Área" = Δs = s₂ − s₁',x+32,y+16);
        }
      );
      t+=1/60; raf=requestAnimationFrame(frame);
    }
    frame();
  }

  else if(type==='graph_tangent_s'){
    let t=0;
    function frame(){
      cx.clearRect(0,0,W,H);
      drawGraph(cx,10,10,W-20,H-20,'S×t — Tangente = Velocidade','t','s',
        (x,w,y,h)=>{
          const pt=Math.sin(t*.8)*.5+.5; // 0..1 position along t axis
          // Parabola (MRUV)
          cx.strokeStyle='#00e5ff';cx.lineWidth=2.5;cx.shadowBlur=8;cx.shadowColor='#00e5ff';
          cx.beginPath();
          for(let i=0;i<=60;i++){
            const ti=i/60;
            const px2=x+28+ti*(w-36);
            const py2=y+h-12-ti*ti*(h-22)*.95;
            i===0?cx.moveTo(px2,py2):cx.lineTo(px2,py2);
          }
          cx.stroke();cx.shadowBlur=0;
          // Tangent point
          const ptx=x+28+pt*(w-36);
          const pty=y+h-12-pt*pt*(h-22)*.95;
          // Tangent line
          const slope=-(2*pt*(h-22)*.95)/(w-36);
          const len=60;
          cx.strokeStyle='#ffd700';cx.lineWidth=2;cx.shadowBlur=6;cx.shadowColor='#ffd700';
          cx.beginPath();
          cx.moveTo(ptx-len,pty-slope*(-len));
          cx.lineTo(ptx+len,pty-slope*len);
          cx.stroke();cx.shadowBlur=0;
          // Point
          cx.beginPath();cx.arc(ptx,pty,5,0,Math.PI*2);cx.fillStyle='#ffd700';cx.fill();
          // Label
          cx.fillStyle='rgba(255,215,0,.9)';cx.font='11px Orbitron,monospace';
          cx.fillText('v = tan(θ)',ptx+8,(pty-20<y+16)?pty+16:pty-8);
        }
      );
      t+=1/60; raf=requestAnimationFrame(frame);
    }
    frame();
  }

  else if(type==='graph_tangent_v'){
    let t=0;
    function frame(){
      cx.clearRect(0,0,W,H);
      drawGraph(cx,10,10,W-20,H-20,'v×t — Tangente = Aceleração','t','v',
        (x,w,y,h)=>{
          // Linear v×t (MRUV)
          cx.strokeStyle='#ffd700';cx.lineWidth=2.5;cx.shadowBlur=8;cx.shadowColor='#ffd700';
          cx.beginPath();
          cx.moveTo(x+28,y+h-12);cx.lineTo(x+w-8,y+14);cx.stroke();cx.shadowBlur=0;
          // Slope triangle
          const pt=.5;
          const x0=x+28+pt*(w-36),y0=y+h-12-pt*(h-26)*.95;
          const dx=80,dy=dx*(h-26)*.95/(w-36);
          const pulse=.15+.08*Math.sin(t*3);
          cx.fillStyle=`rgba(255,0,128,${pulse})`;
          cx.beginPath();
          cx.moveTo(x0,y0);cx.lineTo(x0+dx,y0);cx.lineTo(x0+dx,y0-dy);cx.closePath();cx.fill();
          cx.strokeStyle='rgba(255,0,128,.8)';cx.lineWidth=1.5;
          cx.beginPath();
          cx.moveTo(x0,y0);cx.lineTo(x0+dx,y0);cx.lineTo(x0+dx,y0-dy);cx.stroke();
          // Labels
          cx.fillStyle='rgba(255,0,128,.9)';cx.font='10px Exo 2,sans-serif';
          cx.fillText('Δt',x0+dx*.4,y0+14);cx.fillText('ΔV',x0+dx+4,y0-dy*.4);
          cx.fillStyle='rgba(255,215,0,.9)';cx.font='11px Orbitron,monospace';
          cx.fillText('a = ΔV/Δt',x+32,y+16);
          cx.fillStyle='rgba(255,0,128,.9)';cx.font='11px Orbitron,monospace';
          cx.fillText('tan(θ) = a',x0+8,y0-dy-8);
        }
      );
      t+=1/60; raf=requestAnimationFrame(frame);
    }
    frame();
  }
}

// Helper: draw a graph frame
function drawGraph(cx,x,y,w,h,title,xlab,ylab,drawFn){
  // BG
  cx.fillStyle='rgba(0,0,0,.25)';
  cx.beginPath();cx.roundRect(x,y,w,h,8);cx.fill();
  // Grid
  cx.strokeStyle='rgba(255,255,255,.05)';cx.lineWidth=1;
  for(let i=1;i<5;i++){
    cx.beginPath();cx.moveTo(x,y+h*i/5);cx.lineTo(x+w,y+h*i/5);cx.stroke();
    cx.beginPath();cx.moveTo(x+w*i/5,y);cx.lineTo(x+w*i/5,y+h);cx.stroke();
  }
  // Axes
  cx.strokeStyle='rgba(255,255,255,.35)';cx.lineWidth=1.5;
  cx.beginPath();
  cx.moveTo(x+28,y+6);cx.lineTo(x+28,y+h-8);
  cx.moveTo(x+26,y+h-8);cx.lineTo(x+w-4,y+h-8);
  cx.stroke();
  // Arrow heads
  cx.fillStyle='rgba(255,255,255,.35)';
  cx.beginPath();cx.moveTo(x+28,y+4);cx.lineTo(x+24,y+10);cx.lineTo(x+32,y+10);cx.closePath();cx.fill();
  cx.beginPath();cx.moveTo(x+w-2,y+h-8);cx.lineTo(x+w-8,y+h-12);cx.lineTo(x+w-8,y+h-4);cx.closePath();cx.fill();
  // Labels
  cx.fillStyle='rgba(255,255,255,.4)';cx.font='10px Exo 2,sans-serif';
  cx.fillText(ylab,x+4,y+12);cx.fillText(xlab,x+w-10,y+h-2);
  cx.fillStyle='rgba(255,255,255,.25)';cx.font='10px Orbitron,monospace';
  cx.textAlign='center';cx.fillText(title,x+w/2,y+h-2);cx.textAlign='left';
  // Draw function
  drawFn(x,w,y,h);
}

  const totalStars=ST.progress.reduce((a,p)=>a+p.stars,0);
  const maxStars=MODS.length*3;
  const pct=Math.round(totalStars/maxStars*100);

  const cards=MODS.map((m,i)=>{
    const p=ST.progress[i];
    const locked=!p.unlocked;
    const stars=p.done?starStr(p.stars):'☆☆☆';
    return `
    <div class="mod-card ${locked?'locked':''}" style="--mc:${m.color}"
      onclick="${locked?'':'goTheory('+i+')'}" title="${locked?'Complete o módulo anterior':'Jogar '+m.title}">
      <div class="mod-icon">${m.emoji}</div>
      <div class="mod-name">${m.short}</div>
      <div style="font-size:11px;color:var(--dim);margin-bottom:6px;font-family:var(--fh);letter-spacing:1px">${m.title}</div>
      <div class="mod-desc">${m.desc.replace('\n','<br>')}</div>
      <div class="mod-stars">${stars}</div>
      ${locked?'<div class="lock-badge">🔒</div>':''}
      ${p.done?'<div style="position:absolute;top:10px;right:10px;font-size:11px;color:var(--green);font-family:var(--fh);letter-spacing:1px">✓ CONCLUÍDO</div>':''}
    </div>`;
  }).join('');

  app.innerHTML=`
  <div class="screen" style="gap:0">
    <div class="map-title">🌌 MAPA DA MISSÃO</div>
    <div class="map-sub">Selecione um módulo para estudar</div>
    <div class="modules-row">${cards}</div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-label">PROGRESSO GERAL — ${totalStars}/${maxStars} estrelas</div>
      <div class="progress-bar-track"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
    </div>
    ${totalStars===maxStars?`<button class="btn y" onclick="goFinal()" style="margin-top:20px">🏆 VER RESULTADO FINAL</button>`:''}
  </div>`;
}

// ────────────────────────────────────────
//  THEORY
// ────────────────────────────────────────
function rTheory(){
  const m=MODS[ST.mod];
  const sl=m.theory[ST.slide];
  const total=m.theory.length;

  // Formulas HTML
  const fHtml=sl.formulas?(sl.formulas.map(f=>`
    <div class="formula-box ${f.c}">
      <div class="flabel">${f.l}</div>
      <div class="fexpr">${f.e}</div>
    </div>`).join('')):''

  // Table HTML
  let tableHtml='';
  if(sl.table){
    const headers=sl.table.h.map(h=>`<th>${h}</th>`).join('');
    const rows=sl.table.r.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('');
    tableHtml=`<table class="theory-table"><thead><tr>${headers}</tr></thead><tbody>${rows}</tbody></table>`;
  }

  // Sim canvas
  const simHtml=sl.sim?`<canvas id="sim-canvas" width="740" height="160" style="max-width:100%"></canvas>`:'';

  // Dots
  const dots=m.theory.map((_,i)=>{
    const cls=i===ST.slide?'active':i<ST.slide?'done':'';
    return `<div class="dot ${cls}"></div>`;
  }).join('');

  const isLast=ST.slide===total-1;

  app.innerHTML=`
  <div class="screen" style="gap:0">
    <div class="theory-hdr">
      <div class="theory-mod-name" style="color:${m.color}">${m.emoji} ${m.title}</div>
      <div class="slide-counter">SLIDE ${ST.slide+1} / ${total}</div>
    </div>
    <div class="theory-card">
      <div class="theory-title">${sl.title}</div>
      <div class="theory-text">${sl.text}</div>
      ${fHtml?`<div class="formulas-row">${fHtml}</div>`:''}
      ${tableHtml}
      ${simHtml}
    </div>
    <div class="slide-dots">${dots}</div>
    <div class="theory-nav">
      ${ST.slide>0?`<button class="btn c" onclick="prevSlide()">← ANTERIOR</button>`:''}
      <button class="btn" style="color:var(--dim);border-color:var(--dim)" onclick="goMap()">MAPA</button>
      ${isLast
        ?`<button class="btn y" onclick="startQuiz()">INICIAR QUIZ ▶</button>`
        :`<button class="btn c" onclick="nextSlide()">PRÓXIMO →</button>`
      }
    </div>
  </div>`;

  if(sl.sim) setTimeout(()=>startSim(sl.sim),60);
}

// ────────────────────────────────────────
//  QUIZ
// ────────────────────────────────────────
function rQuiz(){
  const m=MODS[ST.mod];
  const q=m.questions[ST.q];
  const total=m.questions.length;
  const pct=(ST.q/total)*100;
  const lives='❤️'.repeat(ST.lives)+'🖤'.repeat(3-ST.lives);
  const letters=['A','B','C','D'];

  const ansBtns=q.opts.map((opt,i)=>{
    let cls='';
    if(ST.answered){
      if(i===q.ans) cls='correct';
      else if(i===ST.selAns&&i!==q.ans) cls='wrong';
      else cls='reveal';
    }
    return `
    <button class="ans-btn ${cls}" onclick="selectAnswer(${i})" ${ST.answered?'disabled':''}>
      <div class="ans-letter">${letters[i]}</div>
      <span>${opt}</span>
    </button>`;
  }).join('');

  const feedbackHtml=ST.answered?`
    <div class="feedback ${ST.selAns===q.ans?'ok':'no'}">
      ${ST.selAns===q.ans?'✓ Correto! ':'✗ Incorreto. '}${q.exp}
    </div>
    <div class="next-wrap">
      <button class="btn ${ST.selAns===q.ans?'g':'y'}" onclick="nextQuestion()">
        ${ST.q<total-1?'PRÓXIMA QUESTÃO →':'VER RESULTADO ▶'}
      </button>
    </div>`:''

  app.innerHTML=`
  <div class="screen" style="gap:0" id="quiz-wrap">
    <div class="quiz-hdr">
      <div class="lives-hdr">${lives}</div>
      <div class="q-progress"><div class="q-fill" style="width:${pct}%"></div></div>
      <div class="score-hdr">${ST.score} pts</div>
    </div>
    <div class="question-card" id="qcard">
      <div class="q-num">${m.emoji} ${m.title} — QUESTÃO ${ST.q+1} de ${total}</div>
      <div class="q-text">${q.q}</div>
      <div class="answers">${ansBtns}</div>
      ${feedbackHtml}
    </div>
  </div>`;
}

// ────────────────────────────────────────
//  RESULT
// ────────────────────────────────────────
function rResult(){
  const m=MODS[ST.mod];
  const p=ST.progress[ST.mod];
  const stars=p.stars;
  const acc=Math.round(ST.correct/MODS[ST.mod].questions.length*100);

  const msgs={
    3:['🎉 Missão Completa!','Desempenho excepcional!'],
    2:['⭐ Bom trabalho!','Continue praticando!'],
    1:['📚 Continue estudando!','Você pode melhorar!'],
    0:['💪 Não desista!','Revise a teoria e tente novamente!']
  };
  const msg=msgs[Math.min(stars,3)];

  app.innerHTML=`
  <div class="screen" style="gap:0">
    <div class="result-icon">${m.emoji}</div>
    <div class="result-title" style="color:${m.color}">${msg[0]}</div>
    <div style="color:var(--dim);font-size:14px;margin-bottom:8px">${msg[1]}</div>
    <div class="stars-big">${starStr(stars)}</div>
    <div class="result-score">${ST.score}</div>
    <div class="result-score-label">PONTOS</div>
    <div class="result-stats">
      <div class="stat-box">
        <div class="stat-val">${ST.correct}/${MODS[ST.mod].questions.length}</div>
        <div class="stat-label">Acertos</div>
      </div>
      <div class="stat-box">
        <div class="stat-val">${acc}%</div>
        <div class="stat-label">Precisão</div>
      </div>
      <div class="stat-box">
        <div class="stat-val">${3-ST.lives>=0?3-ST.lives:0}</div>
        <div class="stat-label">Erros</div>
      </div>
    </div>
    <div class="result-btns">
      <button class="btn p" onclick="replayModule()">↺ REFAZER</button>
      <button class="btn c" onclick="goMap()">🗺 MAPA</button>
      ${ST.progress.every(p=>p.done)?`<button class="btn y" onclick="goFinal()">🏆 FINAL</button>`:''}
    </div>
  </div>`;
}

// ────────────────────────────────────────
//  FINAL SCREEN
// ────────────────────────────────────────
function rFinal(){
  const totalStars=ST.progress.reduce((a,p)=>a+p.stars,0);
  const maxStars=MODS.length*3;
  const chips=MODS.map((m,i)=>`
    <div class="summary-chip">
      <span>${m.emoji}</span>
      <span style="font-family:var(--fh);font-size:11px;color:${m.color}">${m.short}</span>
      <span>${starStr(ST.progress[i].stars)}</span>
    </div>`).join('');

  app.innerHTML=`
  <div class="screen" style="gap:4px">
    <div style="font-size:48px;text-align:center;animation:popIn .5s both">🏆</div>
    <div class="final-logo">MISSÃO CONCLUÍDA!</div>
    <div style="color:var(--dim);font-size:14px;text-align:center;max-width:400px;line-height:1.7">
      Parabéns! Você completou todos os módulos de Cinemática. Continue praticando para dominar ainda mais a Física!
    </div>
    <span class="final-stars">${starStr(totalStars)}</span>
    <div style="font-family:var(--fh);font-size:36px;color:var(--yellow);text-align:center">${totalStars} / ${maxStars}</div>
    <div style="font-size:11px;color:var(--dim);letter-spacing:3px;margin-bottom:16px;text-align:center">ESTRELAS TOTAIS</div>
    <div class="modules-summary">${chips}</div>
    <div style="display:flex;gap:14px;flex-wrap:wrap;justify-content:center;margin-top:16px">
      <button class="btn c" onclick="resetAll()">↺ JOGAR NOVAMENTE</button>
      <button class="btn y" onclick="goMap()">🗺 VER MAPA</button>
    </div>
  </div>`;
}

// ════════════════════════════════════════
//  ACTIONS
// ════════════════════════════════════════
function goMap(){ ST.screen='map'; render(); }
function goFinal(){ ST.screen='final'; render(); }

function goTheory(i){
  ST.mod=i; ST.slide=0;
  ST.screen='theory'; render();
}

function prevSlide(){
  if(ST.slide>0){ ST.slide--; render(); }
}

function nextSlide(){
  const m=MODS[ST.mod];
  if(ST.slide<m.theory.length-1){ ST.slide++; render(); }
}

function startQuiz(){
  ST.screen='quiz'; ST.q=0;
  ST.lives=3; ST.score=0; ST.correct=0;
  ST.answered=false; ST.selAns=null;
  render();
}

function selectAnswer(idx){
  if(ST.answered) return;
  ST.answered=true; ST.selAns=idx;
  const m=MODS[ST.mod];
  const q=m.questions[ST.q];
  if(idx===q.ans){
    const bonus=Math.max(1,ST.lives);
    ST.score+=100*bonus; ST.correct++;
    spawnParticle('+'+100*bonus,'var(--green)');
  } else {
    ST.lives--;
    spawnParticle('✗','var(--pink)');
    document.getElementById('qcard')?.classList.add('shake');
    setTimeout(()=>document.getElementById('qcard')?.classList.remove('shake'),400);
    if(ST.lives<=0){
      // Game over - end quiz
      setTimeout(()=>{endQuiz();},1200);
      render(); return;
    }
  }
  render();
}

function nextQuestion(){
  const m=MODS[ST.mod];
  if(ST.q<m.questions.length-1){
    ST.q++; ST.answered=false; ST.selAns=null; render();
  } else {
    endQuiz();
  }
}

function endQuiz(){
  // Calc stars
  const acc=ST.correct/MODS[ST.mod].questions.length;
  let stars=0;
  if(acc>=1&&ST.lives>=3) stars=3;
  else if(acc>=.8&&ST.lives>=2) stars=3;
  else if(acc>=.6) stars=2;
  else if(acc>=.4) stars=1;
  else stars=0;

  // Update progress
  const p=ST.progress[ST.mod];
  if(!p.done||stars>p.stars) p.stars=stars;
  p.done=true;
  // Unlock next
  if(ST.mod+1<MODS.length) ST.progress[ST.mod+1].unlocked=true;
  save();
  ST.screen='result'; render();
}

function replayModule(){
  ST.screen='theory'; ST.slide=0; render();
}

function resetAll(){
  ST.progress=[
    {stars:0,done:false,unlocked:true},
    {stars:0,done:false,unlocked:false},
    {stars:0,done:false,unlocked:false}
  ];
  save(); ST.screen='map'; render();
}

// ════════════════════════════════════════
//  UTILS
// ════════════════════════════════════════
function starStr(n){
  return '⭐'.repeat(n)+'☆'.repeat(3-n);
}

function spawnParticle(txt,color){
  const el=document.createElement('div');
  el.className='pfloat';
  el.textContent=txt;
  el.style.color=color;
  el.style.left=Math.random()*60+20+'vw';
  el.style.top=Math.random()*40+25+'vh';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1500);
}

// ════════════════════════════════════════
//  INIT
// ════════════════════════════════════════
render();
</script>
</body>
</html>
